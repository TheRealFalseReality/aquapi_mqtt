name: Publish Firmware

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ['aquapi_mqtt_config.yaml', 'aquapi_mqtt_config.factory.yaml']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Generate version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            version=${{ github.event.release.tag_name }}
          else
            version=dev-$(date +'%Y%m%d-%H%M')
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
      
      - name: Replace project version
        run: |
          sed -i "s/version: dev/version: ${{ steps.version.outputs.version }}/g" ${{ matrix.config }}
      
      - name: Build Firmware
        uses: esphome/build-action@v7
        id: esphome-build
        with:
          yaml-file: ${{ matrix.config }}
          version: latest
          complete-manifest: true
          release-summary: ${{ github.event.release.body }}
          release-url: ${{ github.event.release.html_url }}
        env:
          mqtt_broker: ${{ secrets.MQTT_BROKER }}
          mqtt_password: ${{ secrets.MQTT_PASSWORD }}
          certfile: ${{ secrets.CERTFILE }}
      
      - name: Upload firmware to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.esphome-build.outputs.name }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
